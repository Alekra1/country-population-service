services:
  db:
    image: postgres:18.4-trixie
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  get_data:
    build: .
    image: country-population:local
    command: python get_data.py
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=postgres
    depends_on:
      db:
        condition: service_healthy
  print_data:
    build: .
    image: country-population:local
    command: python print_data.py
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=postgres
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
